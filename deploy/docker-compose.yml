services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ib-gateway
    restart: unless-stopped
    env_file: /etc/strategy-generator/ibkr.env
    environment:
      TRADING_MODE: paper
      READ_ONLY_API: "yes"
      TIME_ZONE: America/New_York
      # IBC schedules its own restart at 11:45pm ET via these.
      RESTART_RECONNECT: "yes"
    expose:
      - "4002"
    # Bridge's 5050 is published here because ibkr-bridge shares this
    # network namespace (see network_mode below). IB Gateway only trusts
    # 127.0.0.1 by default, so the bridge must connect from inside this
    # net ns to be treated as localhost.
    ports:
      - "127.0.0.1:5050:5050"

  ibkr-bridge:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ibkr-bridge
    restart: unless-stopped
    environment:
      IBKR_HOST: 127.0.0.1
      IBKR_PORT: "4002"
      IBKR_CLIENT_ID: "42"
    depends_on:
      - ib-gateway
    network_mode: "service:ib-gateway"
